<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>AR Pinata</title>
    <link rel="stylesheet" href="./styles.css">
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main id="experience" aria-label="AR pinata scene">
      <video id="camera-feed" autoplay muted playsinline></video>
      <div id="scene-root"></div>
      <div id="overlay">
        <section id="ios-native-notice" aria-live="polite">
          <h1>Native iOS-App erforderlich</h1>
          <p>Für echtes AR auf iPhone und iPad muss die native ARKit-App installiert sein.</p>
          <p id="ios-app-help">Noch keine installierbare iOS-Version verfügbar. Installiere die App zunächst über Xcode oder TestFlight.</p>
          <a id="ios-app-link" hidden>iOS AR öffnen</a>
        </section>
        <div id="status" aria-live="polite"></div>
        <div id="farewell" aria-live="polite">See you soon little one!</div>
        <button id="reset-button" type="button">Reset</button>
      </div>
    </main>
    <!-- BUILD_THEME_CONFIG -->
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
